<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Budget Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-orange {
            background-color: #fd7e14 !important;
            color: white !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">💰 Budget Tracker</a>
    <div>
        {% if current_user.is_authenticated %}
            <a class="btn btn-outline-light me-2" href="/goals">
                Goals
                {% if goal_badge_count > 0 %}
                    <span class="badge bg-{{ goal_badge_colour }} ms-1">{{ goal_badge_count }}</span>
                {% endif %}
            </a>
            <a class="btn btn-outline-light me-2" href="/transactions">Transactions</a>
            <a class="btn btn-success me-2" href="/add">+ Add</a>
            <span class="text-white me-2">{{ current_user.username }}</span>
            <a class="btn btn-outline-danger" href="/logout">Logout</a>
        {% else %}
            <a class="btn btn-outline-light me-2" href="/login">Login</a>
            <a class="btn btn-success" href="/register">Register</a>
        {% endif %}
    </div>
</nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
