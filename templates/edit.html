{% extends "base.html" %}

{% block title %}Edit Transaction{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Edit Transaction</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number" step="0.01" name="amount" class="form-control" value="{{ transaction.amount }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Type</label>
                <select name="type" class="form-select">
                    <option value="income" {% if transaction.type == "income" %}selected{% endif %}>Income</option>
                    <option value="expenses" {% if transaction.type == "expenses" %}selected{% endif %}>Expense</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <input type="text" name="category" class="form-control" value="{{ transaction.category }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Date</label>
                <input type="date" name="date" class="form-control" value="{{ transaction.date }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Note</label>
                <input type="text" name="note" class="form-control" value="{{ transaction.note }}">
            </div>
            <button type="submit" class="btn btn-warning w-100">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
